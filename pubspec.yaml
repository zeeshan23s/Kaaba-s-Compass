name: qibla_finder
description: A production-ready Qibla Finder app with prayer times, tasbih counter, and mosque finder.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  flutter_compass: ^0.7.0
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  permission_handler: ^11.3.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.2
  adhan: ^2.0.0+1
  flutter_local_notifications: ^16.3.0
  url_launcher: ^6.2.4
  vibration: ^1.8.4
  share_plus: ^7.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: launcher_icon
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/app_icon.png
  min_sdk_android: 21
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: assets/images/app_icon.png
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
