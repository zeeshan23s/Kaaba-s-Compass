<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Crescent moon + star -->
  <circle cx="100" cy="22" r="14" fill="#C8973A"/>
  <circle cx="109" cy="17" r="10" fill="#0D1117"/>
  <polygon points="127,10 129,16 135,16 130,20 132,26 127,22 122,26 124,20 119,16 125,16"
           fill="#C8973A" transform="scale(0.75) translate(43, 0)"/>

  <!-- Isometric top face of Kaaba -->
  <polygon points="30,70 100,44 170,70 100,96"
           fill="#111827" stroke="#C8973A" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Front face -->
  <rect x="30" y="70" width="140" height="120" rx="3"
        fill="#080810" stroke="#C8973A" stroke-width="2.5"/>

  <!-- Left side face (3D depth) -->
  <polygon points="30,70 30,190 14,178 14,58"
           fill="#06060C" stroke="#C8973A" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Gold Kiswa band -->
  <rect x="30" y="95" width="140" height="20" fill="#C8973A"/>
  <!-- Decorative script lines on Kiswa -->
  <line x1="44" y1="101" x2="90" y2="101" stroke="#FAF6EF" stroke-width="1.5" opacity="0.65"/>
  <line x1="44" y1="107" x2="75" y2="107" stroke="#FAF6EF" stroke-width="1" opacity="0.4"/>
  <line x1="100" y1="101" x2="156" y2="101" stroke="#FAF6EF" stroke-width="1.5" opacity="0.65"/>
  <line x1="110" y1="107" x2="156" y2="107" stroke="#FAF6EF" stroke-width="1" opacity="0.4"/>

  <!-- Gold door with arch -->
  <path d="M78,128 Q100,116 122,128 L122,190 L78,190 Z" fill="#C8973A" opacity="0.92"/>
  <rect x="78" y="128" width="44" height="62" fill="#C8973A" opacity="0.92"/>
  <!-- Door inner panel -->
  <path d="M84,131 Q100,121 116,131 L116,184 L84,184 Z" fill="#06060C" opacity="0.75"/>
  <!-- Door handle -->
  <circle cx="100" cy="165" r="3.5" fill="#C8973A" opacity="0.9"/>
  <rect x="98" y="157" width="4" height="8" rx="2" fill="#C8973A" opacity="0.7"/>

  <!-- Corner pillars (subtle) -->
  <rect x="30" y="70" width="6" height="120" fill="#C8973A" opacity="0.25"/>
  <rect x="164" y="70" width="6" height="120" fill="#C8973A" opacity="0.25"/>
</svg>
